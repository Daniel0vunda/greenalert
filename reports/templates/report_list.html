<!DOCTYPE html>
<html>
<head>
    <title>All Waste Reports - GreenAlert</title>
    <style>
        table {
            border-collapse: collapse;
            width: 90%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
        }
        th {
            background-color: #f2f2f2;
        }
        img {
            width: 100px;
            height: auto;
        }
    </style>
</head>
<body>
    <h2 style="text-align:center;">All Waste Reports</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Location</th>
            <th>Description</th>
            <th>Image</th>
            <th>Status</th>
            <th>Date Submitted</th>
        </tr>
        {% for report in reports %}
        <tr>
            <td>{{ report.name }}</td>
            <td>{{ report.location }}</td>
            <td>{{ report.description }}</td>
            <td>
                {% if report.image %}
                    <img src="{{ report.image.url }}" alt="Waste Image">
                {% else %}
                    No image
                {% endif %}
            </td>
            <td>{{ report.status }}</td>
            <td>{{ report.date_submitted }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
