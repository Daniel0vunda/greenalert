<!DOCTYPE html>
<html>
<head>
    <title>Submit Waste Report - GreenAlert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold">🌿 GreenAlert</a>
            <a href="/reports/" class="btn btn-outline-light btn-sm">View All Reports</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-4">Submit a Waste Report</h4>
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-success w-100">Submit Report</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
